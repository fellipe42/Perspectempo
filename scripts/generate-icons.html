<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Perspectempo — gerador de ícones</title>
  <style>
    body { background: #0e1014; color: #ece8df; font-family: -apple-system, sans-serif; padding: 32px; }
    h1 { font-weight: 500; }
    .row { display: flex; gap: 24px; flex-wrap: wrap; margin-top: 24px; }
    .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    canvas { border: 1px solid #2a2f3a; border-radius: 12px; background: #0e1014; }
    button { background: #c9a96a; color: #0e1014; border: 0; padding: 8px 14px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    p { color: #8a8f99; max-width: 720px; line-height: 1.5; }
    code { background: #1f232c; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Perspectempo — gerador de ícones</h1>
  <p>
    Renderiza o <code>favicon.svg</code> em PNG nas resoluções que o PWA precisa.
    Clique em cada botão para baixar; depois mova os arquivos para <code>public/</code>.
  </p>
  <p>
    Você só precisa fazer isso uma vez (ou quando o ícone mudar).
  </p>

  <div class="row" id="row"></div>

<script>
  const SIZES = [
    { name: 'icon-192.png', size: 192, maskable: false },
    { name: 'icon-512.png', size: 512, maskable: false },
    { name: 'icon-512-maskable.png', size: 512, maskable: true },
    { name: 'apple-touch-icon.png', size: 180, maskable: false },
  ];

  async function load(svgPath) {
    const res = await fetch(svgPath);
    const txt = await res.text();
    const blob = new Blob([txt], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    return new Promise((resolve, reject) => {
      img.onload  = () => { URL.revokeObjectURL(url); resolve(img); };
      img.onerror = reject;
      img.src = url;
    });
  }

  function render(img, size, maskable) {
    const c = document.createElement('canvas');
    c.width = size; c.height = size;
    const ctx = c.getContext('2d');
    // fundo sólido (manifest exige opacidade)
    ctx.fillStyle = '#0e1014';
    if (maskable) {
      ctx.fillRect(0, 0, size, size);
    } else {
      const r = size * 0.20;
      roundedRect(ctx, 0, 0, size, size, r);
      ctx.fill();
    }
    // padding maskable: safe zone 80% central
    if (maskable) {
      const pad = size * 0.10;
      ctx.drawImage(img, pad, pad, size - pad * 2, size - pad * 2);
    } else {
      ctx.drawImage(img, 0, 0, size, size);
    }
    return c;
  }

  function roundedRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function download(canvas, name) {
    canvas.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    }, 'image/png');
  }

  (async () => {
    const img = await load('/favicon.svg');
    const row = document.getElementById('row');
    for (const sp of SIZES) {
      const canvas = render(img, sp.size, sp.maskable);
      const item = document.createElement('div');
      item.className = 'item';
      const small = document.createElement('canvas');
      small.width = 96; small.height = 96;
      small.getContext('2d').drawImage(canvas, 0, 0, 96, 96);
      const btn = document.createElement('button');
      btn.textContent = `baixar ${sp.name}`;
      btn.onclick = () => download(canvas, sp.name);
      const label = document.createElement('div');
      label.textContent = `${sp.size}×${sp.size}${sp.maskable ? ' (maskable)' : ''}`;
      label.style.fontSize = '12px';
      label.style.color = '#8a8f99';
      item.append(small, label, btn);
      row.appendChild(item);
    }
  })();
</script>
</body>
</html>
