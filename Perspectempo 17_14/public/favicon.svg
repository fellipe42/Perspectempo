<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- fundo escuro, mesmo do app -->
  <rect width="512" height="512" rx="96" fill="#0e1014"/>
  <!-- trilho (anel principal) -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#1f232c" stroke-width="22"/>
  <!-- progresso em ouro (~62%) — começa no topo, sentido horário -->
  <circle cx="256" cy="256" r="160"
          fill="none"
          stroke="#c9a96a"
          stroke-width="22"
          stroke-linecap="round"
          stroke-dasharray="623 1005"
          transform="rotate(-90 256 256)"/>
  <!-- ponto "agora" -->
  <circle cx="256" cy="96" r="14" fill="#c9a96a"/>
  <!-- anel interno discreto: a "fração do dia" -->
  <circle cx="256" cy="256" r="100"
          fill="none"
          stroke="#3a4050"
          stroke-width="6"
          opacity="0.6"/>
  <circle cx="256" cy="256" r="100"
          fill="none"
          stroke="#8a8f99"
          stroke-width="6"
          stroke-dasharray="251 628"
          transform="rotate(-90 256 256)"
          opacity="0.7"/>
</svg>
